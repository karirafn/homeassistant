title: Home
path: home-desktop
icon: mdi:monitor
type: sections
max_columns: 3
background: '#0f1117'

sections:
  # ── Section 1: Person pills + private rooms ─────────────────────────────────
  - type: grid
    columns: 1
    square: false
    cards:

      # Person pills
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-person-card
            entity: person.kari
            show_entity_picture: true
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px !important;
                  background: #111827;
                  border: 1px solid #1f2d40;
                  border-radius: 20px;
                }
          - type: custom:mushroom-person-card
            entity: person.magga
            show_entity_picture: true
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px !important;
                  background: #111827;
                  border: 1px solid #1f2d40;
                  border-radius: 20px;
                }
          - type: custom:mushroom-person-card
            entity: person.anaya
            show_entity_picture: true
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px !important;
                  background: #111827;
                  border: 1px solid #1f2d40;
                  border-radius: 20px;
                }

      # Private room cards
      - type: custom:button-card
        template: room_card
        entity: light.master
        name: Hjón
        icon: mdi:bed-king
        variables:
          color: '#6366f1'
          lights:
            - entity: light.master_ceiling
              name: Loft

      - type: custom:button-card
        template: room_card
        entity: light.gudrun
        name: Guðrún
        icon: mdi:bed-single
        variables:
          color: '#ec4899'
          lights:
            - entity: light.gudrun_ceiling
              name: Loft
            - entity: light.gudrun_wall
              name: Veggur
            - entity: light.gudrun_led
              name: LED

      - type: custom:button-card
        template: room_card
        entity: light.anaya
        name: Anaya
        icon: mdi:bed-single
        variables:
          color: '#a855f7'
          lights:
            - entity: light.anaya_ceiling
              name: Loft
            - entity: light.anaya_wall
              name: Veggur
            - entity: light.anaya_led
              name: LED

      - type: custom:button-card
        template: room_card
        entity: light.office
        name: Skrifstofa
        icon: mdi:chair-rolling
        variables:
          color: '#14b8a6'
          lights:
            - entity: light.office_ceiling
              name: Loft

      - type: custom:button-card
        template: room_card
        entity: light.bathroom
        name: Bað
        icon: mdi:bathtub
        variables:
          color: '#3b82f6'
          lights:
            - entity: light.bathroom_mirror
              name: Spegill
            - entity: light.bathroom_sink
              name: Vaskur
            - entity: light.bathroom_bath_shower
              name: Bað/sturta

      - type: custom:button-card
        template: room_card
        entity: light.washingroom
        name: Þvottur
        icon: mdi:washing-machine
        variables:
          color: '#22c55e'
          lights:
            - entity: light.washingroom_cabinets
              name: Innrétting
            - entity: light.washingroom_ceiling
              name: Loft

  # ── Section 2: Entity pills + social rooms ──────────────────────────────────
  - type: grid
    columns: 1
    cards:

      # Entity pills
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.chargie_charge_power
            name: Hleðslustöð
            icon: mdi:ev-station
            icon_color: green
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px !important;
                  background: #0c1a10;
                  border: 1px solid #14532d;
                  border-radius: 20px;
                }
          - type: custom:mushroom-entity-card
            entity: sensor.chargie_monthly_cost_kr
            name: Kostnaður
            icon: mdi:cash
            icon_color: amber
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  padding: 8px 12px !important;
                  background: #1a1400;
                  border: 1px solid #533a00;
                  border-radius: 20px;
                }

      # Social room cards
      - type: custom:button-card
        template: room_card
        entity: light.kitchen
        name: Eldhús
        icon: mdi:countertop
        variables:
          color: '#f59e0b'
          lights:
            - entity: light.kitchen_cabinets
              name: Innrétting
            - entity: light.kitchen_ceiling
              name: Loft
            - entity: light.kitchen_island
              name: Eyja

      - type: custom:button-card
        template: room_card
        entity: light.diningroom
        name: Borðstofa
        icon: mdi:silverware
        variables:
          color: '#eab308'
          lights:
            - entity: light.diningroom_table
              name: Borð

      - type: custom:button-card
        template: room_card
        entity: light.sittingroom
        name: Stofa
        icon: mdi:sofa
        variables:
          color: '#f43f5e'
          lights:
            - entity: light.sittingroom_sofa_table
              name: Sófaborð
            - entity: light.sittingroom_sliding_door
              name: Rennigluggi
            - entity: light.sittingroom_led
              name: LED

      - type: custom:button-card
        template: room_card
        entity: light.livingroom
        name: Sjónvarp
        icon: mdi:television
        variables:
          color: '#06b6d4'
          lights:
            - entity: light.livingroom_ceiling_front
              name: Fremri
            - entity: light.livingroom_ceiling_back
              name: Aftari

      - type: custom:button-card
        template: room_card
        entity: light.entryway
        name: Forstofa
        icon: mdi:door
        variables:
          color: '#f97316'
          lights:
            - entity: light.entryway_ceiling
              name: Loft

      - type: custom:button-card
        template: room_card
        entity: light.hallway
        name: Gangur
        icon: mdi:walk
        variables:
          color: '#94a3b8'
          lights:
            - entity: light.hallway_ceiling
              name: Loft

  # ── Section 3: Charts ───────────────────────────────────────────────────────
  - type: grid
    columns: 1
    cards:

      # Heitt vatn chart
      - type: custom:apexcharts-card
        card_mod:
          style: |
            ha-card {
              background: #0d1117 !important;
              border: 1px solid #1a2332 !important;
              border-radius: 10px !important;
            }
        header:
          title: Heitt vatn
          show: true
        graph_span: 12month
        span:
          end: month
          offset: -1month
        apex_config:
          chart:
            toolbar:
              show: false
          plotOptions:
            bar:
              borderRadius: 3
              borderRadiusApplication: top
          grid:
            borderColor: '#1a2332'
            strokeDashArray: 4
          fill:
            type: solid
            opacity: 1
          xaxis:
            labels:
              style:
                colors: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
                fontSize: 10px
          yaxis:
            decimalsInFloat: 0
            min: 0
            labels:
              style:
                colors: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
                fontSize: 10px
            title:
              text: m³
              rotate: 0
              offsetY: -90
              offsetX: 5
              style:
                fontSize: 14px
                color: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
          annotations:
            yaxis:
              - y: 44
                borderColor: '#60a5fa'
                borderWidth: 2
                strokeDashArray: 4
                label:
                  text: ''
          tooltip:
            theme: dark
        series:
          - entity: sensor.veitur_hot_water
            name: Heitt vatn
            type: column
            color: '#06b6d4'
            unit: m³
            statistics:
              type: sum
              period: hour
            group_by:
              func: delta
              duration: 1month
          - entity: sensor.veitur_hot_water_monthly_mean
            name: Meðaltal
            type: line
            unit: m³
            color: '#60a5fa'
            opacity: 1
            stroke_width: 3
            stroke_dash: 0
            show:
              in_chart: false
            statistics:
              type: mean
              period: hour
            group_by:
              func: last
              duration: 1month

      # Chargie chart
      - type: custom:apexcharts-card
        card_mod:
          style: |
            ha-card {
              background: #0d1117 !important;
              border: 1px solid #1a2332 !important;
              border-radius: 10px !important;
            }
        header:
          title: Chargie
          show: true
        graph_span: 12month
        span:
          end: month
        apex_config:
          chart:
            toolbar:
              show: false
          plotOptions:
            bar:
              borderRadius: 3
              borderRadiusApplication: top
          grid:
            borderColor: '#1a2332'
            strokeDashArray: 4
          fill:
            type: solid
            opacity: 1
          xaxis:
            labels:
              style:
                colors: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
                fontSize: 10px
          yaxis:
            decimalsInFloat: 0
            min: 0
            labels:
              style:
                colors: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
                fontSize: 10px
            title:
              text: kWh
              rotate: 0
              offsetY: -90
              offsetX: 5
              style:
                fontSize: 14px
                color: '#94a3b8'
                fontFamily: "'JetBrains Mono', monospace"
          tooltip:
            theme: dark
        series:
          - entity: sensor.chargie_energy_meter
            name: Chargie
            type: column
            color: '#22c55e'
            unit: kWh
            statistics:
              type: sum
              period: hour
            group_by:
              func: delta
              duration: 1month
