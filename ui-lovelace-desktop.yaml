button_card_templates:
  room_card:
    aspect_ratio: false
    tap_action:
      action: call-service
      service: light.toggle
      service_data:
        entity_id: "[[[ return entity.entity_id ]]]"
    styles:
      card:
        - background: "#0d1117"
        - border-radius: 10px
        - border-top: >
            [[[ return entity.state === 'on'
              ? `2px solid ${variables.color}`
              : '1px solid #1a2332' ]]]
        - border-right: "1px solid #1a2332"
        - border-bottom: "1px solid #1a2332"
        - border-left: "1px solid #1a2332"
        - padding: 0px
      grid:
        - grid-template-areas: '"i n t" "c c c"'
        - grid-template-columns: "20px 1fr auto"
        - grid-template-rows: "auto auto"
        - padding: "10px 12px 8px 12px"
        - gap: 0px
      icon:
        - width: 16px
        - color: >
            [[[ return entity.state === 'on' ? variables.color : '#475569' ]]]
        - padding: "0 8px 0 0"
        - align-self: center
      name:
        - font-size: 12px
        - font-weight: "600"
        - color: >
            [[[ return entity.state === 'on' ? '#94a3b8' : '#475569' ]]]
        - align-self: center
        - justify-self: start
      state:
        - display: none
      custom_fields:
        t:
          - align-self: center
          - justify-self: end
        c:
          - display: flex
          - flex-wrap: wrap
          - gap: 5px
          - padding-top: 8px
          - border-top: "1px solid #0f1623"
          - margin-top: 6px
    custom_fields:
      t: >
        [[[
          const isOn = entity.state === 'on';
          const bri = entity.attributes.brightness
            ? Math.round(entity.attributes.brightness / 255 * 100) + '%'
            : '';
          const col = variables.color || '#6366f1';
          const label = isOn ? (bri || 'ON') : 'OFF';
          return `<div style="display:flex;align-items:center;gap:5px;background:${isOn?`color-mix(in srgb,${col} 15%,#0a0e1a)`:'#111827'};border:1px solid ${isOn?`color-mix(in srgb,${col} 40%,transparent)`:'#1e293b'};border-radius:12px;padding:3px 8px 3px 5px;font-family:'JetBrains Mono',monospace;font-size:9px;color:${isOn?col:'#334155'}"><div style="width:5px;height:5px;border-radius:50%;background:${isOn?col:'#334155'};${isOn?`box-shadow:0 0 4px ${col}`:''}"></div>${label}</div>`;
        ]]]
      c: >
        [[[
          const lights = variables.lights || [];
          const col = variables.color || '#6366f1';
          return lights.map(l => {
            const e = states[l.entity];
            const isOn = e && e.state === 'on';
            const bri = e && e.attributes.brightness
              ? Math.round(e.attributes.brightness / 255 * 100) + '%'
              : '';
            return `<div onclick="event.stopPropagation();hass.callService('light','toggle',{entity_id:'${l.entity}'})" style="display:flex;align-items:center;gap:4px;background:${isOn?`color-mix(in srgb,${col} 10%,#0d1117)`:'#111827'};border:1px solid ${isOn?`color-mix(in srgb,${col} 35%,transparent)`:'#1a2332'};border-radius:6px;padding:4px 8px;font-size:10px;color:${isOn?col:'#334155'};cursor:pointer;white-space:nowrap"><div style="width:4px;height:4px;border-radius:50%;flex-shrink:0;background:${isOn?col:'#1e293b'};${isOn?`box-shadow:0 0 3px ${col}`:''}"></div>${l.name}${isOn&&bri?`<span style="font-family:'JetBrains Mono',monospace;font-size:8px;opacity:.7;margin-left:1px">${bri}</span>`:''}</div>`;
          }).join('');
        ]]]

views:
  - !include views/desktop/home.yaml
  - !include views/mobile/master.yaml
  - !include views/mobile/anaya.yaml
  - !include views/mobile/gudrun.yaml
  - !include views/mobile/office.yaml
  - !include views/mobile/bathroom.yaml
  - !include views/mobile/livingroom.yaml
  - !include views/mobile/washingroom.yaml
  - !include views/mobile/entryway.yaml
  - !include views/mobile/hallway.yaml
  - !include views/mobile/kitchen.yaml
  - !include views/mobile/diningroom.yaml
  - !include views/mobile/sittingroom.yaml
