- sensor:
    - name: Electricity Price Total
      unique_id: electricity_price_total
      unit_of_measurement: kr/kWh
      state_class: measurement
      icon: mdi:lightning-bolt
      # Straumlind (live) + Veitur dreifing orku (live) + jöfnunargjald 0.52 (hardcoded, not in API), × 1.24 VAT
      state: >-
        {% if states('sensor.straumlind_price') not in ['unavailable', 'unknown']
           and states('sensor.veitur_distribution_price') not in ['unavailable', 'unknown'] %}
          {{ ((states('sensor.straumlind_price') | float
             + states('sensor.veitur_distribution_price') | float
             + 0.52) * 1.24) | round(2) }}
        {% else %}
          none
        {% endif %}

    - name: Chargie Monthly Cost Kr
      unique_id: chargie_monthly_cost_kr
      unit_of_measurement: kr
      state_class: measurement
      icon: mdi:cash
      state: >-
        {% set kwh = states('sensor.chargie_monthly_energy') | float(0) %}
        {% set price = states('sensor.electricity_price_total') | float(0) %}
        {{ (kwh * price) | round(0) | int }}

    - name: Veitur Hot Water Monthly Mean
      unique_id: veitur_hot_water_monthly_mean
      unit_of_measurement: m³
      state_class: measurement
      icon: mdi:water-thermometer-outline
      state: >
        {% set current = states('sensor.veitur_hot_water') | float(-1) %}
        {% set complete_months = (now().year - 2025) * 12 + now().month - 4 %}
        {% if current < 0 or complete_months <= 0 %}
          {{ none }}
        {% else %}
          {{ ((current - 340.44) / complete_months) | round(1) }}
        {% endif %}

    - name: Chargie Monthly Energy Mean
      unique_id: chargie_monthly_energy_mean
      unit_of_measurement: kWh
      state_class: measurement
      icon: mdi:ev-station
      state: >
        {% set current = states('sensor.chargie_energy_meter') | float(-1) %}
        {% set complete_months = (now().year - 2024) * 12 + now().month - 1 %}
        {% if current < 0 or complete_months <= 0 %}
          {{ none }}
        {% else %}
          {{ ((current - 12071.361) / complete_months) | round(1) }}
        {% endif %}

